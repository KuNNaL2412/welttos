<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found · Welttos Technologies</title>
<meta name="description" content="The page you're looking for doesn't exist. Return to Welttos Technologies."/>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
<style>
.err-wrap {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 5vw; text-align: center;
  position: relative; z-index: 1;
}
.err-code {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(6rem, 18vw, 12rem);
  font-weight: 800;
  letter-spacing: -0.05em;
  line-height: 0.9;
  background: linear-gradient(115deg, var(--primary) 0%, var(--violet) 55%, #FF6B6B 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: gradShift 5s ease-in-out infinite;
}
.err-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: .8rem; color: var(--primary);
  letter-spacing: .15em; text-transform: uppercase;
  margin-bottom: 16px;
}
.err-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.02em;
  margin-bottom: 14px;
}
.err-sub {
  font-size: 1rem; color: var(--text2);
  max-width: 500px; margin-bottom: 36px;
  line-height: 1.7;
}
.err-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.err-logo {
  width: 64px; height: 64px;
  margin-bottom: 28px;
}
.err-logo img {
  width: 100%; height: 100%; display: block;
  animation: floatY 3s ease-in-out infinite;
}
@keyframes floatY {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="err-wrap">
  <div class="err-logo"><img src="assets/logo.svg" alt="Welttos"/></div>
  <div class="err-code">404</div>
  <div class="err-tag">Page Not Found</div>
  <h1 class="err-title">This page took an unscheduled vacation</h1>
  <p class="err-sub">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="err-btns">
    <a href="index.html" class="btn btn-fill">← Back to Home</a>
    <a href="contact.html" class="btn btn-outline">Contact Support</a>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
